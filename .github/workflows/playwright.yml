name: Playwright Tests

on:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      project:
        description: "Which test project to run"
        type: choice
        options:
          - all
          - ui-tests
          - api-tests
        default: all
      grep:
        description: "Tag filter (e.g. @negative, @high). Leave blank to run all tests."
        type: string
        required: false
        default: ""

jobs:
  ui-tests:
    name: UI Tests
    if: github.event_name != 'workflow_dispatch' || inputs.project == 'all' || inputs.project == 'ui-tests'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run UI tests
        run: pnpm exec playwright test --project=ui-tests ${{ inputs.grep != '' && format('--grep "{0}"', inputs.grep) || '' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ui-test-report
          path: playwright-report/
          retention-days: 14

      - name: Upload results to TestDino
        if: always()
        continue-on-error: true
        env:
          TESTDINO_TOKEN: ${{ secrets.TESTDINO_TOKEN }}
          TESTDINO_RUN_TAGS: ui,${{ github.event_name }}
        run: pnpm run testdino-upload

  api-tests:
    name: API Tests
    if: github.event_name != 'workflow_dispatch' || inputs.project == 'all' || inputs.project == 'api-tests'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm exec playwright test --project=api-tests ${{ inputs.grep != '' && format('--grep "{0}"', inputs.grep) || '' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 14

      - name: Upload results to TestDino
        if: always()
        continue-on-error: true
        env:
          TESTDINO_TOKEN: ${{ secrets.TESTDINO_TOKEN }}
          TESTDINO_RUN_TAGS: api,${{ github.event_name }}
        run: pnpm run testdino-upload
