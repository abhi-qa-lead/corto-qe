name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      project:
        description: "Which test project to run"
        type: choice
        options:
          - all
          - ui-tests
          - api-tests
        default: all
      grep:
        description: "Tag filter (e.g. @negative, @high). Leave blank to run all tests."
        type: string
        required: false
        default: ""

# Allow only one concurrent deployment to GitHub Pages.
# Don't cancel in-progress runs — we want every published deployment to finish cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ui-tests:
    name: UI Tests
    if: github.event_name != 'workflow_dispatch' || inputs.project == 'all' || inputs.project == 'ui-tests'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run UI tests
        run: pnpm exec playwright test --project=ui-tests ${{ inputs.grep != '' && format('--grep "{0}"', inputs.grep) || '' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ui-test-report
          path: playwright-report/
          retention-days: 14

  api-tests:
    name: API Tests
    if: github.event_name != 'workflow_dispatch' || inputs.project == 'all' || inputs.project == 'api-tests'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm exec playwright test --project=api-tests ${{ inputs.grep != '' && format('--grep "{0}"', inputs.grep) || '' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 14

  publish-pages:
    name: Publish Reports to GitHub Pages
    needs: [ui-tests, api-tests]
    # Only publish on push to main or manual dispatch — never on PR runs.
    # PR runs already get their own artifacts uploaded; the public Pages site
    # should only ever reflect the state of `main`.
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (needs.ui-tests.result == 'success' || needs.ui-tests.result == 'failure' ||
       needs.api-tests.result == 'success' || needs.api-tests.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download UI report
        if: needs.ui-tests.result == 'success' || needs.ui-tests.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: ui-test-report
          path: site/ui

      - name: Download API report
        if: needs.api-tests.result == 'success' || needs.api-tests.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: api-test-report
          path: site/api

      - name: Generate landing page
        env:
          UI_RESULT: ${{ needs.ui-tests.result }}
          API_RESULT: ${{ needs.api-tests.result }}
        run: bash .github/scripts/generate-landing-page.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
